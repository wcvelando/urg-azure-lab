name: Terraform Infrastructure Pipeline

on:
  push:
    branches: [main]
    paths:
      - "terraform/environments/**"
      - "terraform/modules/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform/environments/**"
      - "terraform/modules/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Acción"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]
      environment:
        description: "Ambiente a desplegar"
        required: true
        default: "lab"
        type: choice
        options: [lab, prod]
      github_owner:
        description: "Usuario de GitHub para imagen GHCR"
        required: true
        default: "REEMPLAZAR"

permissions:
  contents: read
  pull-requests: write
  id-token: write
  security-events: write

env:
  TF_VERSION: "1.6.0"
  ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

jobs:

  # ── Determinar el ambiente y directorio ──────────────────────
  setup:
    name: "⚙️ Setup"
    runs-on: ubuntu-latest
    outputs:
      tf_dir:     ${{ steps.env.outputs.tf_dir }}
      state_key:  ${{ steps.env.outputs.state_key }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          ENV="${{ github.event.inputs.environment || 'lab' }}"
          echo "tf_dir=terraform/environments/$ENV"   >> $GITHUB_OUTPUT
          echo "state_key=$ENV/student-records.tfstate" >> $GITHUB_OUTPUT
          echo "environment=$ENV"                     >> $GITHUB_OUTPUT

  validate:
    name: "✅ Terraform Validate"
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Crear backend.tf
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "azurerm" {
              resource_group_name  = "${{ secrets.BACKEND_RESOURCE_GROUP }}"
              storage_account_name = "${{ secrets.BACKEND_STORAGE_ACCOUNT }}"
              container_name       = "${{ secrets.BACKEND_CONTAINER }}"
              key                  = "${{ needs.setup.outputs.state_key }}"
            }
          }
          EOF
      - name: Terraform Init
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        env:
          ARM_ACCESS_KEY: ${{ secrets.BACKEND_ACCESS_KEY }}
        run: terraform init -backend=true
      - name: Terraform Format Check
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: terraform fmt -check -recursive ../../
        continue-on-error: true
      - name: Terraform Validate
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: terraform validate

  checkov:
    name: "🏗️ Checkov - IaC Scan"
    runs-on: ubuntu-latest
    needs: [setup, validate]
    steps:
      - uses: actions/checkout@v4
      - run: pip install checkov
      - run: |
          checkov \
            --directory terraform/ \
            --framework terraform \
            --output sarif \
            --output-file-path checkov-infra.sarif \
            --soft-fail
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-infra.sarif
          category: checkov-infra

  conftest:
    name: "📋 OPA/Conftest Policies"
    runs-on: ubuntu-latest
    needs: [setup, validate]
    steps:
      - uses: actions/checkout@v4
      - run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.51.0/conftest_0.51.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.51.0_Linux_x86_64.tar.gz && sudo mv conftest /usr/local/bin/
      - run: |
          conftest test \
            --policy policies/conftest/ \
            --parser hcl2 \
            ${{ needs.setup.outputs.tf_dir }}/main.tf \
            --output json | tee conftest-results.json || true
          echo "### 📋 OPA/Conftest Results" >> $GITHUB_STEP_SUMMARY
          cat conftest-results.json >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conftest-results-${{ needs.setup.outputs.environment }}
          path: conftest-results.json

  plan:
    name: "📋 Terraform Plan (${{ needs.setup.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [setup, checkov, conftest]
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true
      - name: Crear backend.tf
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "azurerm" {
              resource_group_name  = "${{ secrets.BACKEND_RESOURCE_GROUP }}"
              storage_account_name = "${{ secrets.BACKEND_STORAGE_ACCOUNT }}"
              container_name       = "${{ secrets.BACKEND_CONTAINER }}"
              key                  = "${{ needs.setup.outputs.state_key }}"
            }
          }
          EOF
      - name: Terraform Init
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        env:
          ARM_ACCESS_KEY: ${{ secrets.BACKEND_ACCESS_KEY }}
        run: terraform init -backend=true
      - name: Terraform Plan
        id: plan
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        env:
          ARM_ACCESS_KEY: ${{ secrets.BACKEND_ACCESS_KEY }}
          TF_VAR_github_owner: ${{ github.repository_owner }}
          TF_VAR_alert_email:  ${{ secrets.ALERT_EMAIL }}
          TF_VAR_otx_api_key:  ${{ secrets.OTX_API_KEY }}
        run: |
          terraform plan \
            -out=tfplan \
            -detailed-exitcode \
            2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.setup.outputs.environment }}
          path: |
            ${{ needs.setup.outputs.tf_dir }}/tfplan
            ${{ needs.setup.outputs.tf_dir }}/plan-output.txt
          retention-days: 5
      - name: Comentar plan en PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ needs.setup.outputs.tf_dir }}/plan-output.txt','utf8');
            const body = `## 📋 Terraform Plan — \`${{ needs.setup.outputs.environment }}\`\n\n\`\`\`terraform\n${plan.substring(0,65000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner, repo: context.repo.repo, body
            });

  apply:
    name: "🚀 Terraform Apply (${{ needs.setup.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [setup, plan]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: ${{ needs.setup.outputs.environment == 'prod' && 'production' || 'lab' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Crear backend.tf
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "azurerm" {
              resource_group_name  = "${{ secrets.BACKEND_RESOURCE_GROUP }}"
              storage_account_name = "${{ secrets.BACKEND_STORAGE_ACCOUNT }}"
              container_name       = "${{ secrets.BACKEND_CONTAINER }}"
              key                  = "${{ needs.setup.outputs.state_key }}"
            }
          }
          EOF
      - name: Terraform Init
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        env:
          ARM_ACCESS_KEY: ${{ secrets.BACKEND_ACCESS_KEY }}
        run: terraform init -backend=true
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.setup.outputs.environment }}
          path: ${{ needs.setup.outputs.tf_dir }}/
      - name: Terraform Apply
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        env:
          ARM_ACCESS_KEY: ${{ secrets.BACKEND_ACCESS_KEY }}
        run: terraform apply -auto-approve tfplan
      - name: Outputs
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        env:
          ARM_ACCESS_KEY: ${{ secrets.BACKEND_ACCESS_KEY }}
        run: |
          echo "### 🚀 Infraestructura desplegada — ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform output >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  destroy:
    name: "💥 Terraform Destroy (${{ needs.setup.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [setup]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: ${{ needs.setup.outputs.environment == 'prod' && 'production' || 'lab' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Crear backend.tf
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "azurerm" {
              resource_group_name  = "${{ secrets.BACKEND_RESOURCE_GROUP }}"
              storage_account_name = "${{ secrets.BACKEND_STORAGE_ACCOUNT }}"
              container_name       = "${{ secrets.BACKEND_CONTAINER }}"
              key                  = "${{ needs.setup.outputs.state_key }}"
            }
          }
          EOF
      - name: Terraform Init
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        env:
          ARM_ACCESS_KEY: ${{ secrets.BACKEND_ACCESS_KEY }}
        run: terraform init -backend=true
      - name: Terraform Destroy
        working-directory: ${{ needs.setup.outputs.tf_dir }}
        env:
          ARM_ACCESS_KEY:     ${{ secrets.BACKEND_ACCESS_KEY }}
          TF_VAR_github_owner: ${{ github.event.inputs.github_owner }}
          TF_VAR_alert_email:  ${{ secrets.ALERT_EMAIL }}
          TF_VAR_otx_api_key:  ${{ secrets.OTX_API_KEY }}
        run: terraform destroy -auto-approve
